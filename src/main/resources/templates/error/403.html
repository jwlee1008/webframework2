<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 권한 없음 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; padding-bottom: 4rem; }
        .error-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .error-code { font-size: 4rem; font-weight: 800; color: #e94560; }
        .btn-home { background: #e94560; border-color: #e94560; }
        .btn-home:hover { background: #c73652; border-color: #c73652; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card error-card">
                <div class="card-body p-5 text-center">
                    <div class="error-code mb-2">403</div>
                    <h4 class="fw-bold mb-2">접근 권한이 없습니다</h4>
                    <p class="text-muted mb-4">관리자 권한이 필요한 페이지입니다.</p>
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/home}" class="btn btn-home text-white px-4">홈으로</a>
                        <a th:href="@{/products}" class="btn btn-outline-secondary px-4">상품 목록</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: practiceFooter}"></div>
</body>
</html>
